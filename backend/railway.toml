# ─── API Service (FastAPI) ───────────────────────────────────────────────────
# En Railway: crear un servicio, apuntar al directorio /backend,
# y Railway leerá este archivo automáticamente.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Variables requeridas en Railway Dashboard → Variables:
#   DATABASE_URL
#   SUPABASE_JWT_SECRET
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   OPENAI_API_KEY
#   RESEND_API_KEY
#   EMAIL_FROM
#   ENVIRONMENT=production
#   CORS_ORIGINS=https://tu-frontend.vercel.app
